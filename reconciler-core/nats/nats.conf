# =============================================================
# NATS Server Configuration – Reconciler JetStream
# =============================================================

# ── Server Identity ───────────────────────────────────────────
server_name: reconciler-nats
host: 0.0.0.0
port: 4222

# ── Cluster Routing ───────────────────────────────────────────
# Uncomment for multi-node cluster
# cluster {
#   name: reconciler-cluster
#   host: 0.0.0.0
#   port: 6222
#   routes: [
#     nats-route://nats-node-2:6222
#     nats-route://nats-node-3:6222
#   ]
# }

# ── HTTP Monitoring ───────────────────────────────────────────
http_port: 8222

# ── Limits ────────────────────────────────────────────────────
max_payload:       10MB      # Max message size
max_connections:   10000
max_subscriptions: 0         # 0 = unlimited
ping_interval:     "60s"
ping_max:          3
write_deadline:    "10s"

# ── Logging ───────────────────────────────────────────────────
debug:   false
trace:   false
logtime: true
log_size_limit: 100MB

# =============================================================
# JetStream
# =============================================================
jetstream {
  store_dir: "/data/nats/jetstream"

  # Maximum total storage across all streams
  max_memory_store: 1GB
  max_file_store:   20GB
}

# =============================================================
# Accounts & Users (basic auth for dev)
# Override in production with proper credentials / NKeys
# =============================================================
accounts: {
  reconciler: {
    users: [
      { user: reconciler, password: $NATS_PASSWORD }
    ]
    jetstream: enabled
  }
}

# =============================================================
# JetStream Streams
# (Defined via application startup or nats CLI; documented here)
# =============================================================
#
# ── financial-events ──────────────────────────────────────────
# Subjects:  financial.>
# Storage:   file
# Retention: limits  (max_age = 30 days)
# Replicas:  1 (dev), 3 (production)
# MaxMsgSize: 10MB
#
# Example create:
#   nats stream add financial-events \
#     --subjects "financial.>" \
#     --storage file \
#     --retention limits \
#     --max-age 720h \
#     --max-msg-size 10485760 \
#     --replicas 1
#
# ── audit-events ──────────────────────────────────────────────
# Subjects:  audit.>
# Storage:   file
# Retention: limits  (max_age = 7 years = 61320h)
# Replicas:  1 (dev), 3 (production)
# Note:      Immutable audit trail — WorkQueue policy recommended
#            in production with DeliverAll + AckExplicit
#
# Example create:
#   nats stream add audit-events \
#     --subjects "audit.>" \
#     --storage file \
#     --retention limits \
#     --max-age 61320h \
#     --max-msg-size 10485760 \
#     --replicas 1
#
# ── webhook-events ────────────────────────────────────────────
# Subjects:  webhook.>
# Storage:   file
# Retention: limits  (max_age = 7 days)
# MaxMsgs:   1000000
# MaxMsgSize: 10MB
#
# Example create:
#   nats stream add webhook-events \
#     --subjects "webhook.>" \
#     --storage file \
#     --retention limits \
#     --max-age 168h \
#     --max-msgs 1000000 \
#     --max-msg-size 10485760
#
# =============================================================
# Consumers
# =============================================================
#
# ── reconciler (financial-events) ────────────────────────────
# Durable:      reconciler
# Filter:       financial.transactions.>
# Deliver:      DeliverAll
# Ack:          AckExplicit
# MaxDeliver:   5
# AckWait:      30s
#
# ── audit-engine (audit-events) ───────────────────────────────
# Durable:      audit-engine
# Filter:       audit.>
# Deliver:      DeliverAll
# Ack:          AckExplicit
# MaxDeliver:   -1  (unlimited — audit must not be lost)
# AckWait:      60s
#
# ── treasury (financial-events) ───────────────────────────────
# Durable:      treasury
# Filter:       financial.treasury.>
# Deliver:      DeliverNew
# Ack:          AckExplicit
# MaxDeliver:   3
# AckWait:      15s
#
