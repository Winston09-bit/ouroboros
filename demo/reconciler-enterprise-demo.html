<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reconciler — Autonomous Financial Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 /* Volkswagen Group corporate palette — restrained, engineered */
 --vw-blue:#001e50;
 --vw-blue-2:#0a2a63;
 --vw-blue-soft:#15376f;
 --ink:#001e50;
 --ink-2:#3c4858;
 --ink-3:#6b7785;
 --ink-4:#9aa5b1;
 --line:#dfe4e8;
 --line-2:#c8d1d9;
 --bg:#f4f5f6;
 --bg-2:#eceef0;
 --surface:#ffffff;
 --surface-2:#fafbfc;
 --pos:#1d6f4a;
 --pos-bg:#e7f1ec;
 --warn:#8a6400;
 --warn-bg:#f6efdf;
 --neg:#9a2c2c;
 --neg-bg:#f4e7e7;
 --info:#1b4e8a;
 --info-bg:#e6edf5;
 --accent:#00b1eb;
 --radius:3px;
 --shadow:0 1px 2px rgba(0,30,80,.05),0 1px 0 rgba(0,30,80,.02);
 --shadow-2:0 4px 16px rgba(0,30,80,.10);
 --mono:'IBM Plex Mono',ui-monospace,monospace;
 --sans:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.micro{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:0}
::-webkit-scrollbar-track{background:transparent}
.app{display:grid;grid-template-rows:54px 1fr;height:100vh}
.topbar{display:flex;align-items:center;gap:24px;background:var(--vw-blue);color:#fff;padding:0 22px;border-bottom:1px solid #00163d;position:relative;z-index:30}
.brand{display:flex;align-items:center;gap:13px;font-weight:600;letter-spacing:.04em}
.brand .ring{width:26px;height:26px;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;position:relative}
.brand .ring::after{content:"";position:absolute;inset:4px;border:1px solid rgba(255,255,255,.35);border-radius:50%}
.brand small{font-size:9px;letter-spacing:.22em;opacity:.6;display:block;font-weight:500;margin-top:1px}
.topbar .sep{width:1px;height:26px;background:rgba(255,255,255,.16)}
.tstat{display:flex;flex-direction:column;line-height:1.1}
.tstat .k{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:600}
.tstat .v{font-family:var(--mono);font-size:15px;font-weight:500;margin-top:2px}
.tstat .v.pos{color:#7fd1a6}
.topbar .spacer{flex:1}
.tctrl{display:flex;align-items:center;gap:8px}
.tbtn{font-size:11px;letter-spacing:.06em;font-weight:500;color:#fff;border:1px solid rgba(255,255,255,.22);padding:7px 13px;border-radius:var(--radius);display:flex;align-items:center;gap:7px;transition:.15s;text-transform:uppercase}
.tbtn:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.4)}
.tbtn .dot{width:7px;height:7px;border-radius:50%;background:#7fd1a6}
.tbtn.paused .dot{background:#e0b455;animation:none}
.live-dot{width:8px;height:8px;border-radius:50%;background:#7fd1a6;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(127,209,166,.5)}50%{opacity:.55;box-shadow:0 0 0 5px rgba(127,209,166,0)}}
.body{display:grid;grid-template-columns:230px 1fr;overflow:hidden}
.nav{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
.nav .grp{padding:16px 14px 6px;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-4);font-weight:600}
.navitem{display:flex;align-items:center;gap:11px;padding:9px 16px;font-size:13px;color:var(--ink-2);border-left:3px solid transparent;transition:.12s;font-weight:400;width:100%;text-align:left}
.navitem:hover{background:var(--surface-2);color:var(--ink)}
.navitem.active{background:var(--bg-2);color:var(--ink);border-left-color:var(--vw-blue);font-weight:600}
.navitem .ico{width:16px;height:16px;flex-shrink:0;opacity:.7}
.navitem.active .ico{opacity:1}
.navitem .badge{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:600;background:var(--bg-2);color:var(--ink-3);padding:1px 7px;border-radius:10px;min-width:22px;text-align:center}
.navitem .badge.alert{background:var(--warn-bg);color:var(--warn)}
.nav .foot{margin-top:auto;padding:14px;border-top:1px solid var(--line);font-size:10px;color:var(--ink-4);line-height:1.5}
.main{overflow-y:auto;padding:24px 28px 60px;position:relative}
.main::before{content:"";position:fixed;inset:54px 0 0 230px;pointer-events:none;z-index:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:46px 46px;opacity:.28;-webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,.5),transparent 70%);mask-image:linear-gradient(180deg,rgba(0,0,0,.5),transparent 70%)}
.main>*{position:relative;z-index:1}
.page-h{display:flex;align-items:flex-end;gap:16px;margin-bottom:22px;border-bottom:1px solid var(--line);padding-bottom:16px}
.page-h h1{font-size:23px;font-weight:600;letter-spacing:-.01em}
.page-h .sub{font-size:13px;color:var(--ink-3);margin-bottom:3px}
.page-h .num{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.1em}
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card .hd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
.card .hd h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.card .bd{padding:16px}
.kpi{padding:16px 16px 17px}
.kpi .lab{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.kpi .val{font-family:var(--mono);font-size:30px;font-weight:500;letter-spacing:-.02em;margin-top:7px;line-height:1}
.kpi .val small{font-size:15px;color:var(--ink-3)}
.kpi .meta{font-size:11px;color:var(--ink-3);margin-top:8px;display:flex;align-items:center;gap:6px}
.trend.up{color:var(--pos)}.trend.down{color:var(--neg)}
.gauge-wrap{display:flex;align-items:center;gap:22px}
.gauge{position:relative;width:128px;height:128px;flex-shrink:0}
.gauge svg{transform:rotate(-90deg)}
.gauge .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .ctr .big{font-family:var(--mono);font-size:30px;font-weight:600;letter-spacing:-.02em}
.gauge .ctr .lil{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.gauge-legend div{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-2);padding:4px 0}
.gauge-legend .sw{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.gauge-legend .n{margin-left:auto;font-family:var(--mono);font-weight:600}
.feed{max-height:340px;overflow-y:auto}
.fitem{display:flex;gap:11px;padding:9px 16px;border-bottom:1px solid var(--surface-2);font-size:12.5px;animation:slidein .35s ease}
.fitem:nth-child(odd){background:var(--surface-2)}
@keyframes slidein{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.fitem .t{font-family:var(--mono);font-size:11px;color:var(--ink-4);white-space:nowrap;padding-top:1px}
.fitem .tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:1px 6px;border-radius:2px;white-space:nowrap;align-self:flex-start;margin-top:1px}
.fitem .msg{flex:1;color:var(--ink-2)}
.fitem .msg b{color:var(--ink);font-weight:600}
.tag.evt{background:var(--info-bg);color:var(--info)}
.tag.ok{background:var(--pos-bg);color:var(--pos)}
.tag.warn{background:var(--warn-bg);color:var(--warn)}
.tag.err{background:var(--neg-bg);color:var(--neg)}
.tag.ai{background:#ece9f5;color:#4b3b80}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{text-align:left;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface-2);position:sticky;top:0;z-index:2}
thead th.r{text-align:right}
tbody td{padding:11px 14px;border-bottom:1px solid var(--surface-2);color:var(--ink-2)}
tbody td.r{text-align:right;font-family:var(--mono)}
tbody tr{transition:.1s;cursor:pointer}
tbody tr:hover{background:var(--surface-2)}
tbody tr.sel{background:var(--info-bg)}
.merch{display:flex;align-items:center;gap:10px}
.logo{width:26px;height:26px;border-radius:var(--radius);background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--ink);flex-shrink:0;font-family:var(--mono)}
.amt.neg{color:var(--ink)}
.amt.pos{color:var(--pos)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill .pd{width:6px;height:6px;border-radius:50%}
.pill.booked{background:var(--pos-bg);color:var(--pos)}.pill.booked .pd{background:var(--pos)}
.pill.review{background:var(--warn-bg);color:var(--warn)}.pill.review .pd{background:var(--warn)}
.pill.processing{background:var(--info-bg);color:var(--info)}.pill.processing .pd{background:var(--info);animation:pulse 1.4s infinite}
.pill.recovering{background:#ece9f5;color:#4b3b80}.pill.recovering .pd{background:#4b3b80;animation:pulse 1.4s infinite}
.pill.held{background:var(--neg-bg);color:var(--neg)}.pill.held .pd{background:var(--neg)}
.pill.detected{background:var(--bg-2);color:var(--ink-3)}.pill.detected .pd{background:var(--ink-4)}
.conf{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.conf .bar{width:46px;height:5px;background:var(--bg-2);border-radius:3px;overflow:hidden}
.conf .bar i{display:block;height:100%;background:var(--vw-blue)}
.conf.low .bar i{background:var(--warn)}
.conf .pct{font-family:var(--mono);font-size:11.5px;font-weight:600;width:42px;text-align:right}
.conn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(214px,1fr));gap:13px}
.conn{border:1px solid var(--line);border-radius:var(--radius);padding:15px;background:var(--surface);box-shadow:var(--shadow);transition:.15s}
.conn:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.conn .row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.conn .nm{font-weight:600;font-size:14px}
.conn .ty{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);font-weight:600}
.conn .protos{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;min-height:22px}
.proto{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);border:1px solid var(--line);padding:2px 6px;border-radius:2px}
.cbtn{width:100%;font-size:12px;font-weight:600;letter-spacing:.04em;padding:9px;border-radius:var(--radius);border:1px solid var(--vw-blue);color:var(--vw-blue);background:#fff;transition:.15s;text-transform:uppercase}
.cbtn:hover{background:var(--vw-blue);color:#fff}
.cbtn.connected{background:var(--pos-bg);color:var(--pos);border-color:transparent;cursor:default}
.cbtn.connecting{background:var(--bg-2);color:var(--ink-3);border-color:var(--line);cursor:wait}
.conn.is-on{border-color:#bcd0c6}
.spin{width:13px;height:13px;border:2px solid var(--ink-4);border-top-color:transparent;border-radius:50%;display:inline-block;animation:rot .6s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}
.agent{display:flex;gap:14px;padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow)}
.agent .av{width:42px;height:42px;border-radius:var(--radius);background:var(--vw-blue);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.agent.busy .av{background:var(--vw-blue);box-shadow:0 0 0 0 rgba(0,30,80,.4);animation:work 1.5s infinite}
@keyframes work{0%{box-shadow:0 0 0 0 rgba(0,30,80,.30)}70%{box-shadow:0 0 0 8px rgba(0,30,80,0)}100%{box-shadow:0 0 0 0 rgba(0,30,80,0)}}
.agent .nm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.agent .st{font-size:11.5px;color:var(--ink-3);margin-top:2px;min-height:17px}
.agent .stats{display:flex;gap:18px;margin-top:11px}
.agent .stats div{display:flex;flex-direction:column}
.agent .stats .n{font-family:var(--mono);font-size:17px;font-weight:600;line-height:1}
.agent .stats .l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);font-weight:600;margin-top:3px}
.stateled{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--bg-2);color:var(--ink-3)}
.stateled.on{background:var(--pos-bg);color:var(--pos)}
.drawer-bg{position:fixed;inset:0;background:rgba(0,30,80,.32);z-index:40;opacity:0;pointer-events:none;transition:.2s}
.drawer-bg.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:94vw;background:var(--surface);z-index:41;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,30,80,.18)}
.drawer.show{transform:none}
.drawer .dh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.drawer .dh .x{margin-left:auto;font-size:22px;color:var(--ink-3);line-height:1;width:30px;height:30px;border-radius:var(--radius)}
.drawer .dh .x:hover{background:var(--bg-2);color:var(--ink)}
.drawer .dbody{overflow-y:auto;padding:22px;flex:1}
.dsec{margin-bottom:24px}
.dsec>.micro{display:block;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.kv{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--surface-2)}
.kv .k{color:var(--ink-3)}.kv .v{font-family:var(--mono);font-weight:500}
.tl{position:relative;padding-left:24px}
.tl::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl .ev{position:relative;padding:0 0 17px}
.tl .ev::before{content:"";position:absolute;left:-21px;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--vw-blue)}
.tl .ev.aiv::before{border-color:#4b3b80}
.tl .ev.okv::before{background:var(--pos);border-color:var(--pos)}
.tl .ev .et{font-family:var(--mono);font-size:11px;font-weight:600}
.tl .ev .em{font-size:12px;color:var(--ink-2);margin-top:2px}
.tl .ev .ets{font-family:var(--mono);font-size:10px;color:var(--ink-4);margin-top:2px}
.evidence{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px}
.evidence .er{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12.5px}
.evidence .er .ck{color:var(--pos);font-weight:700}
.appr{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);padding:16px;margin-bottom:13px}
.appr .top{display:flex;align-items:flex-start;gap:13px}
.appr .why{background:var(--warn-bg);border-left:3px solid var(--warn);padding:9px 12px;border-radius:2px;font-size:12.5px;color:#6b5200;margin:13px 0}
.appr .acts{display:flex;gap:10px}
.btn{font-size:12.5px;font-weight:600;letter-spacing:.03em;padding:9px 18px;border-radius:var(--radius);transition:.15s}
.btn.primary{background:var(--vw-blue);color:#fff}
.btn.primary:hover{background:var(--vw-blue-2)}
.btn.ghost{border:1px solid var(--line-2);color:var(--ink-2)}
.btn.ghost:hover{background:var(--bg-2)}
.btn.danger{border:1px solid #d9b3b3;color:var(--neg)}
.btn.danger:hover{background:var(--neg-bg)}
.vatrate{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--surface-2)}
.vatrate .rt{font-family:var(--mono);font-size:18px;font-weight:600;width:54px}
.vatbar{flex:1;height:8px;background:var(--bg-2);border-radius:4px;overflow:hidden}
.vatbar i{display:block;height:100%;background:var(--vw-blue);transition:width .5s}
.meter{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--surface-2)}
.meter .nm{width:170px;font-size:12.5px;color:var(--ink-2)}
.meter .track{flex:1;height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden}
.meter .track i{display:block;height:100%;background:var(--pos);transition:width .4s}
.meter .track i.warn{background:var(--warn)}
.meter .vv{font-family:var(--mono);font-size:12px;font-weight:600;width:60px;text-align:right}
.chaos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.chaosbtn{border:1px solid var(--line);background:var(--surface);border-radius:var(--radius);padding:13px;text-align:left;transition:.15s}
.chaosbtn:hover{border-color:var(--neg);background:var(--neg-bg)}
.chaosbtn .nm{font-weight:600;font-size:13px;margin-bottom:3px}
.chaosbtn .ds{font-size:11px;color:var(--ink-3)}
.empty{text-align:center;padding:50px 20px;color:var(--ink-4)}
.empty .big{font-size:15px;color:var(--ink-3);font-weight:500;margin-bottom:6px}
.note{font-size:12px;color:var(--ink-3);background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--vw-blue);padding:11px 14px;border-radius:2px;margin-bottom:18px;line-height:1.5}
.flash{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--vw-blue);color:#fff;padding:12px 22px;border-radius:var(--radius);font-size:13px;z-index:60;opacity:0;transition:.25s;box-shadow:var(--shadow-2);display:flex;align-items:center;gap:10px}
.flash.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
.scroll-x{overflow-x:auto}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
 <header class="topbar">
 <div class="brand">
 <div class="ring">R</div>
 <div>RECONCILER<small>AUTONOMOUS FINANCIAL OS</small></div>
 </div>
 <div class="sep"></div>
 <div class="tstat"><span class="k">Autonomy</span><span class="v pos" id="t-aut">—</span></div>
 <div class="tstat"><span class="k">Events processed</span><span class="v" id="t-evt">0</span></div>
 <div class="tstat"><span class="k">Cash position</span><span class="v" id="t-cash">—</span></div>
 <div class="spacer"></div>
 <div class="tctrl">
 <span class="live-dot" id="live"></span>
 <span class="mono" id="t-clock" style="font-size:13px;opacity:.85">00:00:00</span>
 <button class="tbtn" id="btn-pause"><span class="dot"></span><span id="pause-lbl">Live</span></button>
 </div>
 </header>
 <div class="body">
 <nav class="nav">
 <div class="grp">Operations</div>
 <button class="navitem active" data-view="cockpit"><span class="ico">◧</span>Cockpit</button>
 <button class="navitem" data-view="ledger"><span class="ico">≡</span>Transaktioner<span class="badge" id="nb-led">0</span></button>
 <button class="navitem" data-view="approvals"><span class="ico">⚠</span>Granskning<span class="badge alert" id="nb-app">0</span></button>
 <div class="grp">Intelligence</div>
 <button class="navitem" data-view="agents"><span class="ico">◆</span>AI-agenter<span class="badge" id="nb-agt">6</span></button>
 <button class="navitem" data-view="vat"><span class="ico">%</span>Moms &amp; skatt</button>

<script>
"use strict";
const BANKS=[{id:'nordea',nm:'Nordea',ty:'Bank · SE',protos:['PSD2','SEPA','SWIFT'],cur:'SEK'},{id:'seb',nm:'SEB',ty:'Bank · SE',protos:['PSD2','SEPA','RTP'],cur:'SEK'},{id:'revolut',nm:'Revolut',ty:'Bank · EU',protos:['Open Banking','SEPA'],cur:'EUR'},{id:'amex',nm:'American Express',ty:'Card · Global',protos:['Card rails'],cur:'SEK'},{id:'chase',nm:'Chase',ty:'Bank · US',protos:['ACH','Fedwire'],cur:'USD'},{id:'hsbc',nm:'HSBC',ty:'Bank · UK',protos:['Open Banking UK','SWIFT'],cur:'GBP'}];
const ERPS=[{id:'fortnox',nm:'Fortnox',ty:'ERP · SE'},{id:'visma',nm:'Visma',ty:'ERP · SE'},{id:'xero',nm:'Xero',ty:'ERP · Global'},{id:'sap',nm:'SAP',ty:'ERP · Enterprise'}];
const MERCHANTS=[{nm:'ICA Maxi Lindhagen',ab:'IC',cat:'Provisions',vat:.12,sign:-1,lo:240,hi:1850,recvProb:.55},{nm:'Amazon Web Services',ab:'AW',cat:'Cloud infra',vat:.25,sign:-1,lo:4200,hi:21000,recvProb:.2},{nm:'SJ AB',ab:'SJ',cat:'Travel',vat:.06,sign:-1,lo:380,hi:2400,recvProb:.4},{nm:'Telia Sverige AB',ab:'TE',cat:'Telecom',vat:.25,sign:-1,lo:790,hi:3100,recvProb:.15},{nm:'Spotify Technology',ab:'SP',cat:'Software',vat:.25,sign:-1,lo:120,hi:340,recvProb:.1},{nm:'Clas Ohlson',ab:'CO',cat:'Office',vat:.25,sign:-1,lo:90,hi:1600,recvProb:.6},{nm:'Scaleway SAS',ab:'SC',cat:'Cloud infra',vat:.20,sign:-1,lo:1900,hi:8800,recvProb:.3},{nm:'Stripe Payments',ab:'ST',cat:'Revenue',vat:.00,sign:+1,lo:8000,hi:96000,recvProb:.9},{nm:'Klarna Bank AB',ab:'KL',cat:'Revenue',vat:.00,sign:+1,lo:12000,hi:140000,recvProb:.92},{nm:'Notion Labs',ab:'NO',cat:'Software',vat:.25,sign:-1,lo:140,hi:520,recvProb:.2},{nm:'WeWork Sthlm',ab:'WE',cat:'Rent',vat:.25,sign:-1,lo:14000,hi:14000,recvProb:.3},{nm:'Lön — personal',ab:'LÖ',cat:'Payroll',vat:.00,sign:-1,lo:48000,hi:52000,recvProb:1}];
const ICA_ALIASES=['ICA MAXI','ICA Sverige AB','ICA Göteborg','ICA#4412','ICA Kvantum'];
const AGENTS=[{id:'recon',nm:'Reconciliation Agent',ico:'⇄',desc:'Matchar transaktioner mot ledger, bedömer confidence, flaggar avvikelser.',done:0,busy:false,last:'Väntar på inflöde'},{id:'receipt',nm:'Receipt Recovery Agent',ico:'❏',desc:'Återskapar saknade kvitton — söker mail, Kivra, ERP; kontaktar leverantör.',done:0,busy:false,last:'Inga saknade kvitton'},{id:'vat',nm:'VAT Agent',ico:'%',desc:'Beräknar moms, verifierar satser per jurisdiktion, bygger momsrapport.',done:0,busy:false,last:'Momsbok i balans'},{id:'audit',nm:'Audit Agent',ico:'◰',desc:'Bygger revisionsunderlag, verifierar lineage, exporterar audit packs.',done:0,busy:false,last:'Lineage komplett'},{id:'treas',nm:'Treasury Agent',ico:'≈',desc:'Analyserar runway, likviditetsrisk och optimerar cashflow i realtid.',done:0,busy:false,last:'Runway nominell'},{id:'comm',nm:'Communication Agent',ico:'✉',desc:'Mailar leverantörer, följer upp, sammanfattar och eskalerar vid behov.',done:0,busy:false,last:'Inga öppna trådar'}];
const _savedConns=(()=>{try{const v=localStorage.getItem('reconciler.conns');return v?JSON.parse(v):{}}catch(e){return{}}})();const S={view:'cockpit',running:true,tick:0,clockBase:Date.now(),conns:_savedConns,txns:[],events:[],approvals:[],cash:0,vat:{collected:0,deductible:0,byRate:{}},metrics:{autoHandled:0,totalHandled:0,retries:0,ocrFail:0,dupes:0,escalations:0},agents:Object.fromEntries(AGENTS.map(a=>[a.id,{...a}])),selected:null,txCounter:1000,dirty:true};
let SPEED=1;
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=(n)=>new Intl.NumberFormat('sv-SE',{maximumFractionDigits:0}).format(Math.round(n));
const money=(n)=>fmt(n)+' kr';
const pad=n=>String(n).padStart(2,'0');
function simClock(){const sec=Math.floor((Date.now()-S.clockBase)/1000);return pad(8+Math.floor(sec/3600)%24)+':'+pad(Math.floor(sec/60)%60)+':'+pad(sec%60)}
let evtSeq=0;
function emit(type,msg,kind='evt',txnId=null){evtSeq++;const e={seq:evtSeq,type,msg,kind,txnId,t:simClock(),ts:Date.now()};S.events.unshift(e);if(S.events.length>400)S.events.length=400;if(txnId){const tx=S.txns.find(t=>t.id===txnId);if(tx)tx.lineage.push(e)}S.dirty=true;return e}
function flash(msg){const f=$('#flash');f.innerHTML='<span class="live-dot"></span>'+msg;f.classList.add('show');clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove('show'),2600)}
function connectedBanks(){return BANKS.filter(b=>S.conns[b.id]==='on')}
function autonomyPct(){if(S.metrics.totalHandled===0)return 0;return S.metrics.autoHandled/S.metrics.totalHandled*100}
function connect(id){if(S.conns[id])return;const all=[...BANKS,...ERPS];const c=all.find(x=>x.id===id);S.conns[id]='connecting';emit('ConnectorAuthInitiated',`Startar OAuth-flöde mot <b>${c.nm}</b> · provider abstraction kalibrerar`,'evt');render();setTimeout(()=>{emit('OAuthConsentGranted',`${c.nm}: consent beviljat · scopes auto-mappade`,'ok');render()},700);setTimeout(()=>{emit('WebhookRegistered',`${c.nm}: webhooks registrerade · schema normaliserat till canonical ontology`,'ok');render()},1300);setTimeout(()=>{S.conns[id]='on';try{localStorage.setItem('reconciler.conns',JSON.stringify(S.conns))}catch(e){}emit('ConnectorOnline',`<b>${c.nm}</b> är ansluten · realtidssync aktiv`,'ok');if(BANKS.find(b=>b.id===id)){const seed=ri(60000,180000);S.cash+=seed;emit('BalanceSynced',`${c.nm}: ingående saldo ${money(seed)} synkat`,'evt')}flash(`${c.nm} ansluten — inflöde startar autonomt`);render()},2000)}
function newTxn(){const banks=connectedBanks();if(!banks.length)return;const bank=pick(banks);let m=pick(MERCHANTS);let amount=Math.round(rnd(m.lo,m.hi));let display=m.nm;if(m.ab==='IC'&&Math.random()<0.6)display=pick(ICA_ALIASES);const id='TX-'+(++S.txCounter);const hasReceipt=Math.random()<m.recvProb;const tx={id,bank:bank.nm,bankId:bank.id,merchant:m,display,amount,sign:m.sign,gross:amount,vatRate:m.vat,vat:m.sign<0?Math.round(amount-amount/(1+m.vat)):0,status:'detected',confidence:0,hasReceipt,evidence:[],lineage:[],created:Date.now(),held:false};S.txns.unshift(tx);if(S.txns.length>180)S.txns.length=180;emit('TransactionDetected',`${bank.nm}: ${tx.sign<0?'utbetalning':'inbetalning'} <b>${money(amount)}</b> · ${display}`,'evt',id);return tx}
function resolveEntity(tx){if(tx.display!==tx.merchant.nm){emit('EntityResolved',`"${tx.display}" → kanonisk entitet <b>${tx.merchant.nm}</b> (vector + probabilistic match)`,'ai',tx.id)}}
function scoreConfidence(tx){let c=0.55;c+=0.22;c+=tx.hasReceipt?0.16:-0.06;c+=(tx.merchant.cat==='Revenue'||tx.merchant.cat==='Payroll')?0.10:0.06;if(tx.display!==tx.merchant.nm)c-=0.05;c+=rnd(-0.05,0.06);c=Math.max(0.42,Math.min(0.998,c));tx.confidence=c;tx.evidence=[{ok:true,t:`Belopp matchat mot bankflöde (${money(tx.gross)})`},{ok:true,t:`Leverantör verifierad: ${tx.merchant.nm}`},{ok:c>0.7,t:`Historiskt mönster ${c>0.7?'matchat':'osäkert'} · kategori ${tx.merchant.cat}`},{ok:tx.hasReceipt,t:tx.hasReceipt?`Underlag/kvitto kopplat`:`Underlag saknas`},{ok:true,t:`Moms ${(tx.vatRate*100)|0}% konsistent`}]}
function bookTxn(tx,auto=true){tx.status='booked';S.cash+=tx.sign*tx.gross;if(tx.sign<0&&tx.vat>0){S.vat.deductible+=tx.vat;const k=(tx.vatRate*100)|0;S.vat.byRate[k]=(S.vat.byRate[k]||0)+tx.vat}S.metrics.totalHandled++;if(auto)S.metrics.autoHandled++;S.agents.recon.done++;S.agents.vat.done++;S.agents.audit.done++;emit('VATCalculated',`Moms ${(tx.vatRate*100)|0}% = ${money(tx.vat)} · verifierad mot SE-regelverk`,'ai',tx.id);emit('LedgerEntryPosted',`Dubbel bokföring postad · ledger i balans`,'ok',tx.id);emit('AuditTrailGenerated',`Lineage förseglad · immutable · konfidens ${(tx.confidence*100).toFixed(1)}%`,'ai',tx.id);if(auto)emit('AutoBooked',`<b>Auto-bokförd</b> utan människa · ${money(tx.gross)} ${tx.merchant.nm}`,'ok',tx.id);else emit('ApprovedBooked',`Bokförd efter manuellt godkännande · ${money(tx.gross)}`,'ok',tx.id);S.dirty=true}
function startReceiptRecovery(tx){tx.status='recovering';const a=S.agents.receipt;a.busy=true;a.last=`Återskapar kvitto för ${tx.merchant.nm}`;const co=S.agents.comm;co.busy=true;co.last=`Kontaktar ${tx.merchant.nm}`;const steps=[['SearchedMailbox','Sökte mailbox · ingen träff','evt'],['SearchedKivra','Sökte Kivra digital brevlåda · ingen träff','evt'],['SearchedERP','Sökte ERP-arkiv · ingen träff','evt'],['MerchantIdentified',`Identifierade merchant-endpoint för ${tx.merchant.nm}`,'ai'],['VendorContacted',`Skickade autonom förfrågan till ${tx.merchant.nm}`,'ai'],['VendorFollowup','Påminnelse skickad · väntar svar','evt'],['ReceiptReceived','Svar mottaget · PDF inkommen','ok'],['OCRCompleted','OCR + layout analysis klar · belopp & moms extraherade','ai']];let i=0;const run=()=>{if(i>=steps.length){a.busy=false;a.done++;a.last='Kvitto återskapat & verifierat';co.busy=false;co.last='Tråd avslutad';tx.hasReceipt=true;scoreConfidence(tx);emit('ReceiptRecovered',`Saknat kvitto <b>återskapat autonomt</b> · ${tx.merchant.nm}`,'ok',tx.id);bookTxn(tx,true);render();return}const[t,m,k]=steps[i++];emit(t,m,k,tx.id);render();setTimeout(run,rnd(520,900)/SPEED)};emit('ReceiptRecoveryStarted',`Receipt Recovery Agent startad · ${tx.merchant.nm}`,'ai',tx.id);setTimeout(run,400/SPEED)}
function processTxn(tx){tx.status='processing';const a=S.agents.recon;a.busy=true;a.last=`Matchar ${tx.merchant.nm} · ${money(tx.gross)}`;resolveEntity(tx);setTimeout(()=>{scoreConfidence(tx);emit('ConfidenceScored',`Confidence <b>${(tx.confidence*100).toFixed(1)}%</b> beräknad · ${tx.evidence.filter(e=>e.ok).length}/${tx.evidence.length} evidens ok`,'ai',tx.id);a.busy=false;a.last=`Senast: ${tx.merchant.nm} @ ${(tx.confidence*100).toFixed(0)}%`;if(!tx.hasReceipt&&tx.merchant.recvProb<1&&Math.random()<0.85){startReceiptRecovery(tx)}else if(tx.confidence>=0.95){bookTxn(tx,true)}else if(tx.confidence>=0.85){bookTxn(tx,true)}else{tx.status='review';if(!S.approvals.includes(tx.id))S.approvals.push(tx.id);S.metrics.escalations++;emit('EscalatedToHuman',`Confidence under tröskel (${(tx.confidence*100).toFixed(1)}%) · <b>eskalerad till granskning</b>`,'warn',tx.id)}render()},rnd(700,1400)/SPEED)}
function injectChaos(type){const banks=connectedBanks();if(!banks.length){flash('Anslut minst en bank först');return}if(type==='dupe'){const base=S.txns.find(t=>t.status==='booked')||S.txns[0];if(!base){flash('Ingen transaktion att duplicera ännu');return}const id='TX-'+(++S.txCounter);emit('DuplicateDetected',`Duplicerad payload upptäckt (${base.merchant.nm} ${money(base.gross)}) · idempotency-nyckel matchar`,'warn',id);setTimeout(()=>{S.metrics.dupes++;emit('DuplicateDiscarded',`Dubblett kasserad autonomt · ledger oförändrad`,'ok',id);render()},700)}else if(type==='corrupt'){const tx=newTxn();if(!tx)return;tx.hasReceipt=false;emit('CorruptedPDFReceived',`Korrupt PDF mottagen för ${tx.merchant.nm} · OCR misslyckades`,'err',tx.id);S.metrics.ocrFail++;let r=0;const retry=()=>{r++;S.metrics.retries++;emit('OCRRetry',`OCR retry ${r}/3 · backoff ${r*400}ms`,'warn',tx.id);if(r>=3){emit('OCREscalated',`OCR gav upp efter 3 försök · eskalerad till granskning`,'warn',tx.id);tx.status='review';tx.confidence=0.4;scoreConfidence(tx);tx.confidence=0.4;if(!S.approvals.includes(tx.id))S.approvals.push(tx.id);S.metrics.escalations++;render();return}setTimeout(retry,600)};setTimeout(retry,600)}else if(type==='webhook'){emit('WebhookDelayed',`Fördröjd webhook upptäckt · ${pick(banks).nm} · out-of-order event buffrat`,'warn');setTimeout(()=>emit('WebhookReordered',`Event omsorterat via sequence-nummer · konsistens återställd`,'ok'),800)}else if(type==='outage'){const b=pick(banks);emit('ConnectorDegraded',`${b.nm} API svarar långsamt (latency spike 4200ms) · circuit breaker armerad`,'err');setTimeout(()=>emit('ConnectorRecovered',`${b.nm} återställd · buffrade events replayade`,'ok'),1600);S.metrics.retries+=2}else if(type==='fraud'){const tx=newTxn();if(!tx)return;tx.confidence=0.33;tx.status='held';tx.held=true;emit('FraudSuspected',`<b>Misstänkt avvikelse</b> · ${tx.merchant.nm} ${money(tx.gross)} · vendor risk score 0.82`,'err',tx.id);emit('PaymentHeld',`Transaktion fryst i avvaktan på granskning · behavioral anomaly`,'warn',tx.id);if(!S.approvals.includes(tx.id))S.approvals.push(tx.id);S.metrics.escalations++}render()}
function approve(id){const tx=S.txns.find(t=>t.id===id);if(!tx)return;S.approvals=S.approvals.filter(x=>x!==id);tx.held=false;emit('ApprovalGranted',`Människa godkände ${tx.id} · ${tx.merchant.nm}`,'ok',id);bookTxn(tx,false);flash(`Godkänd & bokförd: ${tx.merchant.nm}`);render()}
function reject(id){const tx=S.txns.find(t=>t.id===id);if(!tx)return;S.approvals=S.approvals.filter(x=>x!==id);tx.status='held';tx.held=true;S.metrics.totalHandled++;emit('ApprovalRejected',`Människa avvisade ${tx.id} · markerad för utredning`,'err',id);flash(`Avvisad: ${tx.merchant.nm}`);render()}
function step(){if(!S.running)return;S.tick++;const banks=connectedBanks();if(banks.length){if(Math.random()<Math.min(0.85,0.35+banks.length*0.12)){const tx=newTxn();if(tx)setTimeout(()=>processTxn(tx),rnd(250,700)/SPEED)}if(S.tick%6===0){const t=S.agents.treas;const days=Math.max(1,Math.round(S.cash/16000));t.last=`Runway ${days} dagar · likviditet ${S.cash<0?'NEGATIV':'nominell'}`;t.done++;if(S.cash<0)emit('TreasuryRiskDetected',`Negativ likviditet · ${money(S.cash)} · larm till treasury`,'warn');else if(S.tick%18===0)emit('TreasuryAnalysed',`Cashflow analyserad · runway ${days} dagar · ingen risk`,'evt')}}S.dirty=true}
function render(){S.dirty=true}
function paint(){$('#t-aut').textContent=autonomyPct().toFixed(1)+'%';$('#t-evt').textContent=fmt(evtSeq);$('#t-cash').textContent=money(S.cash);$('#t-clock').textContent=simClock();$('#nb-led').textContent=S.txns.length;$('#nb-con').textContent=Object.values(S.conns).filter(v=>v==='on').length;const appN=S.approvals.length;const appBadge=$('#nb-app');appBadge.textContent=appN;appBadge.style.display=appN?'':'inline-block';appBadge.className='badge'+(appN?' alert':'');$$('.navitem').forEach(n=>n.classList.toggle('active',n.dataset.view===S.view));$('#main').innerHTML=VIEWS[S.view]();S.dirty=false}
function statusPill(tx){const map={booked:['booked','Bokförd'],review:['review','Granskning'],processing:['processing','Bearbetar'],recovering:['recovering','Återhämtar kvitto'],held:['held','Fryst'],detected:['detected','Upptäckt']};const[c,l]=map[tx.status]||['detected','—'];return `<span class="pill ${c}"><span class="pd"></span>${l}</span>`}
function confBar(tx){if(!tx.confidence)return '<span style="color:var(--ink-4)" class="mono">—</span>';const low=tx.confidence<0.85;return `<span class="conf ${low?'low':''}"><span class="bar"><i style="width:${(tx.confidence*100).toFixed(0)}%"></i></span><span class="pct">${(tx.confidence*100).toFixed(1)}%</span></span>`}
function pageHead(title,sub,num){return `<div class="page-h"><h1>${title}</h1><div class="sub">${sub}</div><div class="num">${num||''}</div></div>`}
function vCockpit(){const aut=autonomyPct();const onBanks=connectedBanks().length;const booked=S.txns.filter(t=>t.status==='booked').length;const recovering=S.txns.filter(t=>t.status==='recovering').length;if(onBanks===0){return pageHead('Cockpit','Realtidsöversikt av den autonoma ekonomin','SANDBOX')+`<div class="note">Detta är en <b>simulerad finansiell värld</b> — fake banker, företag, kvitton, moms och edge cases. Inga riktiga pengar. Härda systemet innan launch.</div><div class="empty"><div class="big">Ingen datakälla ansluten ännu</div>Anslut en bank eller ett ERP under <b>Anslutningar</b> så börjar den autonoma motorn observera ekonomin i realtid.<div style="margin-top:18px"><button class="btn primary" onclick="go('connect')">Gå till Anslutningar →</button></div></div>`}const R=54,C=2*Math.PI*R,off=C*(1-aut/100);const feed=S.events.slice(0,9).map(e=>`<div class="fitem"><span class="t">${e.t}</span><span class="tag ${e.kind}">${e.type}</span><span class="msg">${e.msg}</span></div>`).join('');const busyAgents=Object.values(S.agents).filter(a=>a.busy);return pageHead('Cockpit','Realtidsöversikt av den autonoma ekonomin',simClock())+`<div class="grid g4" style="margin-bottom:14px"><div class="card kpi"><div class="lab">Autonom drift</div><div class="val">${aut.toFixed(1)}<small>%</small></div><div class="meta">${S.metrics.autoHandled} av ${S.metrics.totalHandled} hanterade utan människa</div></div><div class="card kpi"><div class="lab">Cash position</div><div class="val" style="font-size:25px">${fmt(S.cash)}<small> kr</small></div><div class="meta">${onBanks} datakällor · realtidssync</div></div><div class="card kpi"><div class="lab">Bokförda autonomt</div><div class="val">${booked}</div><div class="meta">${recovering>0?`<span style="color:var(--info)">${recovering} kvitton återhämtas nu</span>`:'inga öppna kvittoärenden'}</div></div><div class="card kpi"><div class="lab">I granskning</div><div class="val" style="${S.approvals.length?'color:var(--warn)':''}">${S.approvals.length}</div><div class="meta">human-in-the-loop kö</div></div></div><div class="grid g3" style="grid-template-columns:330px 1fr;align-items:start"><div class="card"><div class="hd"><h3>Autonomy split</h3></div><div class="bd"><div class="gauge-wrap"><div class="gauge"><svg width="128" height="128" viewBox="0 0 128 128"><circle cx="64" cy="64" r="${R}" fill="none" stroke="var(--bg-2)" stroke-width="11"/><circle cx="64" cy="64" r="${R}" fill="none" stroke="var(--vw-blue)" stroke-width="11" stroke-linecap="butt" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="transition:stroke-dashoffset .6s"/></svg><div class="ctr"><div class="big">${aut.toFixed(0)}%</div><div class="lil">Autonom</div></div></div><div class="gauge-legend" style="flex:1"><div><span class="sw" style="background:var(--vw-blue)"></span>Autonomt hanterat<span class="n">${S.metrics.autoHandled}</span></div><div><span class="sw" style="background:var(--warn)"></span>Eskalerat till människa<span class="n">${S.metrics.escalations}</span></div><div><span class="sw" style="background:var(--bg-2)"></span>Mål: 95–99%<span class="n">↑</span></div></div></div></div></div><div class="card"><div class="hd"><h3>Live händelseström</h3><span class="micro" style="display:flex;gap:7px;align-items:center"><span class="live-dot"></span>${busyAgents.length} agenter aktiva</span></div><div class="feed">${feed||'<div class="empty">Inväntar events…</div>'}</div></div></div>`}

// ─── Helpers ──────────────────────────────────────────────────────────────────

function _fmt(n, decimals) {
  if (n === undefined || n === null) return '—';
  decimals = decimals !== undefined ? decimals : 0;
  return Number(n).toLocaleString('sv-SE', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function _countryFlag(code) {
  const flags = {SE:'🇸🇪', DE:'🇩🇪', US:'🇺🇸', CH:'🇨🇭', GB:'🇬🇧'};
  return (flags[code] || '🌐') + ' ' + code;
}

function _toSEK(amount, currency) {
  if (currency === 'SEK') return amount;
  const rate = ENT.treasury.fxRates[currency];
  if (!rate) return amount;
  return amount * rate;
}

function _typeBadge(type) {
  const map = {
    operating: ['OPERATING', '#1d6f4a'],
    treasury:  ['TREASURY',  '#6b3fa0'],
    holding:   ['HOLDING',   '#001e50'],
  };
  const [label, color] = map[type] || [type.toUpperCase(), '#888'];
  return `<span style="font-size:9px;font-weight:700;letter-spacing:.07em;padding:2px 7px;border-radius:3px;background:${color};color:#fff;">${label}</span>`;
}

function _riskPill(risk) {
  const map = {low:'#1d6f4a', medium:'#b8860b', high:'#c0392b'};
  return `<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;background:${map[risk]||'#888'};color:#fff;">${risk.toUpperCase()}</span>`;
}

function _statusPill(label, color) {
  return `<span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;background:${color};color:#fff;">${label}</span>`;
}

// Seed vendor risk scores once
function _getVendorRisk() {
  if (ENT._vendorRisk) return ENT._vendorRisk;
  const vendors = ENT.graph.nodes.filter(n => n.type === 'vendor');
  ENT._vendorRisk = {};
  const seeds = [0.72, 0.18, 0.45];
  vendors.forEach((v, i) => { ENT._vendorRisk[v.id] = seeds[i] !== undefined ? seeds[i] : Math.round((0.1 + Math.random()*0.75)*100)/100; });
  return ENT._vendorRisk;
}

window.vFinancialGraph = function() {
  const nodes = ENT.graph.nodes;
  const edges = ENT.graph.edges;
  const pos   = _graphPositions();
  const filter = ENT.graphFilter || 'all';
  const selectedId = ENT.selectedNode;

  // Build SVG
  const svgW = 900, svgH = 500;

  function nodeVisible(n) {
    if (filter === 'all') return true;
    if (filter === 'entities') return n.type === 'entity';
    if (filter === 'banks')    return n.type === 'bank';
    if (filter === 'vendors')  return n.type === 'vendor';
    return true;
  }

  const visibleIds = new Set(nodes.filter(nodeVisible).map(n => n.id));

  const edgeSVG = edges.map(e => {
    if (!visibleIds.has(e.from) || !visibleIds.has(e.to)) return '';
    const f = pos[e.from], t = pos[e.to];
    if (!f || !t) return '';
    return `<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}"
      stroke="#aaa" stroke-width="${e.weight}" stroke-opacity="0.4"
      marker-end="url(#arr)"/>`;
  }).join('');

  const nodeSVG = nodes.map(n => {
    if (!visibleIds.has(n.id)) return '';
    const p = pos[n.id];
    if (!p) return '';
    const col = _nodeColor(n.type);
    const isSelected = selectedId === n.id;
    const r = isSelected ? 22 : 18;
    const strokeW = isSelected ? 3 : 0;
    const shortLabel = n.label.length > 14 ? n.label.slice(0, 13) + '…' : n.label;
    return `<g class="graph-node" onclick="selectGraphNode('${n.id}')" style="cursor:pointer;">
      <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${col}" stroke="#fff" stroke-width="${strokeW}" opacity="0.92"/>
      <text x="${p.x}" y="${p.y + r + 13}" text-anchor="middle" font-size="10" font-family="inherit" font-weight="700" fill="var(--vw-blue,#001e50)">${shortLabel}</text>
      <text x="${p.x}" y="${p.y + r + 24}" text-anchor="middle" font-size="9" font-family="inherit" fill="#888">${n.sub}</text>
    </g>`;
  }).join('');

  const svgEl = `<svg viewBox="0 0 ${svgW} ${svgH}" width="100%" height="${svgH}" style="background:#f7f8fa;border-radius:10px;border:1.5px solid #e5e5e5;display:block;">
    <defs>
      <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#aaa"/>
      </marker>
      <style>
        .graph-node circle { transition: r .15s, opacity .15s; }
        .graph-node:hover circle { opacity: 1; r: 22; }
      </style>
    </defs>
    ${edgeSVG}
    ${nodeSVG}
  </svg>`;

  // Node detail sidebar
  let detailPanel = '';
  if (selectedId) {
    const selNode = nodes.find(n => n.id === selectedId);
    const relEdges = edges.filter(e => e.from === selectedId || e.to === selectedId);
    const relNodes = relEdges.map(e => {
      const otherId = e.from === selectedId ? e.to : e.from;
      const dir = e.from === selectedId ? '→' : '←';
      const other = nodes.find(n => n.id === otherId);
      return `<div style="padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:11px;color:#555;">${dir} <b style="color:var(--vw-blue,#001e50);">${other ? other.label : otherId}</b> — ${e.label}</div>`;
    }).join('');
    detailPanel = `<div style="min-width:220px;max-width:260px;background:#fff;border:1.5px solid #e5e5e5;border-radius:10px;padding:16px;">
      <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Noddetaljer</div>
      <div style="font-size:15px;font-weight:800;color:var(--vw-blue,#001e50);margin-bottom:3px;">${selNode ? selNode.label : selectedId}</div>
      <div style="font-size:11px;color:#888;margin-bottom:10px;">${selNode ? selNode.sub : ''}</div>
      ${_typeBadge(selNode ? selNode.type : 'entity')}
      <div style="margin-top:12px;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Relationer (${relEdges.length})</div>
      ${relNodes || '<div style="font-size:11px;color:#aaa;">Inga relationer</div>'}
    </div>`;
  }

  // Filter buttons
  const filterBtns = ['all','entities','banks','vendors'].map(f => {
    const labels = {all:'ALLA', entities:'ENTITIES', banks:'BANKS', vendors:'VENDORS'};
    const active = filter === f;
    return `<button onclick="ENT.graphFilter='${f}';if(window.render)render();"
      style="padding:5px 12px;border-radius:4px;border:1.5px solid ${active?'var(--vw-blue,#001e50)':'#e5e5e5'};background:${active?'var(--vw-blue,#001e50)':'#fff'};color:${active?'#fff':'#555'};font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;">${labels[f]}</button>`;
  }).join('');

  // Vendor risk table
  const vendorRisk = _getVendorRisk();
  const vendors = nodes.filter(n => n.type === 'vendor');
  const vendorRows = vendors.map(v => {
    const risk = vendorRisk[v.id] || 0;
    const relCount = edges.filter(e => e.from === v.id || e.to === v.id).length;
    const volEdge = edges.find(e => (e.from === v.id || e.to === v.id) && e.label.includes('txns'));
    const vol = volEdge ? volEdge.label : '—';
    const riskLabel = risk < 0.3 ? 'LOW' : risk < 0.6 ? 'MEDIUM' : 'HIGH';
    const riskColor = risk < 0.3 ? '#1d6f4a' : risk < 0.6 ? '#b8860b' : '#c0392b';
    return `<tr style="border-bottom:1px solid #f0f0f0;">
      <td style="padding:8px 10px;font-size:12px;font-weight:600;color:var(--vw-blue,#001e50);">${v.label}</td>
      <td style="padding:8px 10px;font-size:12px;text-align:center;">${relCount}</td>
      <td style="padding:8px 10px;font-size:12px;color:#555;">${vol}</td>
      <td style="padding:8px 10px;text-align:right;font-size:12px;font-weight:700;color:${riskColor};">${risk.toFixed(2)}</td>
      <td style="padding:8px 10px;">${_statusPill(riskLabel, riskColor)}</td>
    </tr>`;
  }).join('');

  return `
<div style="font-family:inherit;">
  <!-- Header -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
    <h2 style="margin:0;font-size:20px;font-weight:800;color:var(--vw-blue,#001e50);">Financial Graph · Relationskartan</h2>
    <span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:3px;background:#6b3fa0;color:#fff;letter-spacing:.08em;">BETA</span>
  </div>

  <!-- Filter buttons -->
  <div style="display:flex;gap:8px;margin-bottom:16px;">${filterBtns}</div>

  <!-- Graph + detail panel -->
  <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:20px;">
    <div style="flex:1;min-width:0;">${svgEl}</div>
    ${detailPanel}
  </div>

  <!-- Vendor Risk table -->
  <div style="background:#fff;border:1.5px solid #e5e5e5;border-radius:10px;padding:20px;">
    <div style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;">Vendor Risk Intelligence</div>
    <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="border-bottom:2px solid #e5e5e5;">
            <th style="padding:8px 10px;text-align:left;font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Vendor</th>
            <th style="padding:8px 10px;text-align:center;font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Relationer</th>
            <th style="padding:8px 10px;text-align:left;font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Total Vol</th>
            <th style="padding:8px 10px;text-align:right;font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Risk Score</th>
            <th style="padding:8px 10px;text-align:left;font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.06em;">Status</th>
          </tr>
        </thead>
        <tbody>${vendorRows}</tbody>
      </table>
    </div>
  </div>
</div>`;
};

// ── helpers ──────────────────────────────────────────────────────────────────

function _fmt(n, cur) {
  return new Intl.NumberFormat('sv-SE', {minimumFractionDigits:0, maximumFractionDigits:0}).format(n) + ' ' + (cur||'SEK');
}

function _pct(v) {
  return (v * 100).toFixed(1) + '%';
}

function _confBar(v, width) {
  const pct = Math.round(v * 100);
  const color = v >= 0.95 ? 'var(--pos)' : v >= 0.85 ? 'var(--warn)' : 'var(--neg)';
  return `<div style="display:flex;align-items:center;gap:6px">
    <div style="flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;min-width:${width||60}px">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width .3s"></div>
    </div>
    <span style="font-size:11px;color:var(--dim);min-width:38px">${pct}%</span>
  </div>`;
}

function _pill(label, color, small) {
  const map = {pos:'var(--pos)',neg:'var(--neg)',warn:'var(--warn)',info:'var(--info)',ai:'var(--ai)',dim:'var(--dim)'};
  const c = map[color] || color || 'var(--dim)';
  const fs = small ? '10px' : '11px';
  const px = small ? '6px' : '8px';
  const py = small ? '2px' : '3px';
  return `<span style="display:inline-block;padding:${py} ${px};background:${c}22;color:${c};border:1px solid ${c}55;border-radius:4px;font-size:${fs};font-weight:600;letter-spacing:.04em;white-space:nowrap">${label}</span>`;
}

function _avatar(name) {
  const initials = name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--vw-blue);border:2px solid var(--border);color:#fff;font-size:11px;font-weight:700;flex-shrink:0" title="${name}">${initials}</span>`;
}

function _statusDot(status) {
  const map = {operational:'var(--pos)', degraded:'var(--warn)', down:'var(--neg)'};
  return `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${map[status]||'var(--dim)'};box-shadow:0 0 6px ${map[status]||'var(--dim)'}66;flex-shrink:0"></span>`;
}

function _card(content, extra) {
  return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;${extra||''}">${content}</div>`;
}

function _sectionHead(title, sub) {
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <span style="font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.06em">${title}</span>
    ${sub ? `<span style="font-size:11px;color:var(--dim)">${sub}</span>` : ''}
  </div>`;
}

function _table(heads, rows, opts) {
  opts = opts||{};
  const thStyle = `padding:8px 10px;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;text-align:left`;
  const trStyle = `border-bottom:1px solid rgba(255,255,255,.04)`;
  const tdStyle = `padding:9px 10px;font-size:12px;color:var(--text);vertical-align:middle`;
  const ths = heads.map(h=>`<th style="${thStyle}">${h}</th>`).join('');
  const trs = rows.map((cells, ri)=>{
    const tds = cells.map(c=>`<td style="${tdStyle}">${c}</td>`).join('');
    const hover = opts.hover ? `onmouseenter="this.style.background='rgba(255,255,255,.03)'" onmouseleave="this.style.background=''"` : '';
    const click = opts.onClick ? `onclick="${opts.onClick}(${ri})" style="cursor:pointer"` : '';
    return `<tr style="${trStyle}" ${hover} ${click}>${tds}</tr>`;
  }).join('');
  return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
    <thead><tr>${ths}</tr></thead>
    <tbody>${trs}</tbody>
  </table></div>`;
}

function _escalateCountdown(escalatesAt) {
  const now = new Date();
  const [h,m,s] = escalatesAt.split(':').map(Number);
  const esc = new Date(); esc.setHours(h,m,s||0,0);
  const diff = Math.floor((esc - now) / 1000 / 60);
  if (diff < 0) return `<span style="color:var(--neg);font-weight:700;font-size:11px">⚠ ESKALERAT</span>`;
  if (diff < 60) return `<span style="color:var(--neg);font-weight:700;font-size:11px">⏰ ${diff} min</span>`;
  const hrs = Math.floor(diff/60), mins = diff%60;
  return `<span style="color:var(--dim);font-size:11px">${hrs}h ${mins}m</span>`;
}

function _flash(el) {
  if (!el) return;
  el.style.transition = 'background .15s';
  el.style.background = 'rgba(29,111,74,.25)';
  setTimeout(()=>{ el.style.background = ''; }, 600);
}

function _emit(type, detail, color) {
  const c = color || 'info';
  const map = {pos:'var(--pos)',neg:'var(--neg)',warn:'var(--warn)',info:'var(--info)',ai:'var(--ai)'};
  const ev = new CustomEvent('recon:event', {detail:{type, detail, color: map[c]||map.info}});
  document.dispatchEvent(ev);
  // fallback toast
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid ${map[c]||map.info};border-radius:8px;padding:12px 18px;font-size:12px;color:var(--text);z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.5);max-width:320px;animation:fadeIn .2s`;
  toast.innerHTML = `<span style="color:${map[c]||map.info};font-weight:700">${type}</span> <span style="color:var(--dim)">${detail}</span>`;
  document.body.appendChild(toast);
  setTimeout(()=>{ toast.style.opacity='0'; toast.style.transition='opacity .4s'; setTimeout(()=>toast.remove(),400); }, 3200);
}

window.rejectEnterprise = function(id) {
  const idx = window.APPR.queue.findIndex(q=>q.id===id);
  if (idx === -1) return;
  const item = window.APPR.queue[idx];
  window.APPR.queue.splice(idx, 1);
  window.APPR.history.unshift({
    id: item.id,
    merchant: item.merchant,
    amount: item.amount,
    approved: false,
    by: 'Manual Reject',
    time: new Date().toTimeString().slice(0,5),
    reason: 'Rejected via UI'
  });
  _emit('REJECTED', `${item.id} · ${item.merchant}`, 'neg');
  const card = document.getElementById('appr-card-'+id);
  if (card) {
    card.style.border = '1px solid var(--neg)';
    setTimeout(()=>{ card.style.opacity='0'; card.style.transition='opacity .4s'; setTimeout(()=>card.remove(),450); },300);
  }
  const badge = document.getElementById('appr-queue-badge');
  if (badge) badge.textContent = window.APPR.queue.length;
  _refreshApprHistory();
};

function _refreshApprHistory() {
  const el = document.getElementById('appr-history-body');
  if (!el) return;
  el.innerHTML = window.APPR.history.map(h=>{
    const dec = h.approved
      ? `<span style="color:var(--pos);font-weight:700">✓ GODKÄND</span>`
      : `<span style="color:var(--neg);font-weight:700">✕ AVVISAD</span>`;
    const reason = h.reason ? ` <span style="color:var(--dim);font-size:10px">(${h.reason})</span>` : '';
    return `<tr style="border-bottom:1px solid rgba(255,255,255,.04)">
      <td style="padding:7px 10px;font-size:11px;color:var(--dim)">${h.id}</td>
      <td style="padding:7px 10px;font-size:12px">${h.merchant}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:right;white-space:nowrap">${_fmt(h.amount)}</td>
      <td style="padding:7px 10px">${dec}${reason}</td>

      <td style="padding:7px 10px;font-size:11px;color:var(--dim)">${h.time}</td>

}

function _apprPolicyColor(p) {
  const map = {pos:'var(--pos)',info:'var(--info)',warn:'var(--warn)',neg:'var(--neg)',ai:'var(--ai)'};

  document.querySelectorAll('[id^="ai-decision-expand-"]').forEach(e=>{ e.style.display='none'; });

    if (row) row.style.background = 'rgba(126,87,194,.08)';
  }
};

function injectEnterpriseCSS() {
  const style = document.createElement('style');

  document.head.appendChild(style);
}

function injectEntitySelector() {
  const tctrl = document.querySelector('.tctrl');
  if (!tctrl || document.querySelector('.entity-selector')) return;
  const flags = {landvex_se:'🇸🇪', landvex_de:'🇩🇪', landvex_us:'🇺🇸', treasury_ch:'🇨🇭', holding:'🏛️'};
  const sel = document.createElement('div');
  sel.className = 'entity-selector';
  sel.innerHTML = `<span class="lbl">Entity</span>`;

  function updateChip() {
    const e = (window.ENT?.entities || []).find(x => x.id === (window.ENT?.activeEntity || 'landvex_se'));
    const existing = sel.querySelector('.entity-chip');
    const chip = document.createElement('button');
    chip.className = 'entity-chip';
    chip.innerHTML = `<span class="flag">${flags[e?.id] || '🏢'}</span>${e?.nm || 'LandveX AB'}`;
    chip.onclick = () => window.go && window.go('multiEntity');
    if (existing) sel.replaceChild(chip, existing);
    else sel.appendChild(chip);
  }
  updateChip();
  setInterval(updateChip, 2000);

  const liveDot = tctrl.querySelector('.live-dot');
  if (liveDot) tctrl.insertBefore(sel, liveDot);
  else tctrl.prepend(sel);
}

function injectEnterpriseNav() {
  const nav = document.querySelector('.nav');
  if (!nav || document.querySelector('[data-view="multiEntity"]')) return;

  const grp = document.createElement('div');
  grp.className = 'grp';
  grp.textContent = 'Enterprise';

  const items = [
    {view:'multiEntity',    ico:'⊞', label:'Multi-Entity',    badge:null},
    {view:'treasury',       ico:'≋', label:'Treasury Intel',  badge:null},
    {view:'graph',          ico:'◎', label:'Financial Graph', badge:null},
    {view:'approvalEngine', ico:'⊛', label:'Approval Engine', badge:'aq', alert:true},
    {view:'aiGov',          ico:'◈', label:'AI Governance',   badge:null},
    {view:'globalInfra',    ico:'⊟', label:'Global Infra',    badge:null},
  ];

  const infraGrp = Array.from(nav.querySelectorAll('.grp')).find(g => g.textContent.includes('Infrastructure'));
  if (infraGrp) {
    nav.insertBefore(grp, infraGrp);
    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'navitem';
      btn.dataset.view = item.view;
      const badgeHtml = item.badge ? `<span class="badge${item.alert ? ' alert' : ''}" id="nb-${item.badge}">0</span>` : '';
      btn.innerHTML = `<span class="ico">${item.ico}</span>${item.label}${badgeHtml}`;
      btn.addEventListener('click', () => window.go && window.go(item.view));
      nav.insertBefore(btn, infraGrp);
    });
  }
}

  if (!window.VIEWS) { setTimeout(registerEnterpriseViews, 100); return; }

function patchMainTick() {
  let tickCount = 0;
  const origStep = window.step;
  window.step = function() {
    if (origStep) origStep();
    tickCount++;
    if (tickCount % 8 === 0 && window.treasuryTick) {
      window.treasuryTick();
    }
    // Update AQ badge
    const aqBadge = document.querySelector('#nb-aq');
    if (aqBadge && window.APPR) {
      aqBadge.textContent = window.APPR.queue.length;
    }
  };
}

document.addEventListener('DOMContentLoaded', () => {
  // Wait for base app to init
  setTimeout(() => {
    injectEnterpriseCSS();
    injectEntitySelector();
    injectEnterpriseNav();
    registerEnterpriseViews();
    patchMainTick();

      if (n.dataset.view) {
        n.addEventListener('click', () => window.go && window.go(n.dataset.view));

});

        <label style="display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:#3c4858;margin-bottom:6px">${f.label}</label>
        ${f.type==='select'
          ? `<select id="cf-${f.id}" style="width:100%;padding:9px 12px;border:1px solid #dfe4e8;border-radius:3px;font-size:13px;font-family:inherit;background:#fff;color:#001e50">
              ${(f.options||[]).map(o=>`<option>${o}</option>`).join('')}
             </select>`
          : `<input id="cf-${f.id}" type="${f.type||'text'}" placeholder="${f.placeholder||''}"
              style="width:100%;padding:9px 12px;border:1px solid #dfe4e8;border-radius:3px;font-size:13px;font-family:var(--mono,'IBM Plex Mono',monospace);color:#001e50;background:#fff"
              value="${f.placeholder?.includes('•') ? '' : f.placeholder||''}">`}
        <div style="font-size:11px;color:#9aa5b1;margin-top:4px">${f.hint||''}</div>
      </div>`).join('')}
    <div id="conn-flow-steps" style="display:none;margin-top:18px">
      <div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:#6b7785;margin-bottom:10px">Anslutningsflöde</div>
      ${cfg.steps.map((s,i)=>`
        <div id="step-${id}-${i}" style="display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12.5px;color:#9aa5b1;border-bottom:1px solid #fafbfc">
          <div id="step-ic-${id}-${i}" style="width:18px;height:18px;border-radius:50%;border:2px solid #dfe4e8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px">
            ${i+1}
          </div>
          ${s}
        </div>`).join('')}
    </div>`;

  const footer = document.getElementById('conn-modal-footer');
  footer.innerHTML = `
    <button onclick="closeConnectionModal()" style="padding:9px 18px;border:1px solid #c8d1d9;border-radius:3px;font-size:12.5px;font-weight:600;color:#3c4858;cursor:pointer;background:#fff">Avbryt</button>
    <button id="conn-submit-btn" onclick="submitConnection('${id}')"
      style="padding:9px 22px;background:#001e50;color:#fff;border:none;border-radius:3px;font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.04em">
      Anslut med ett klick →
    </button>`;
};

window.submitConnection = function(id) {
  const cfg = PROVIDER_CONFIGS[id];
  if (!cfg) return;
  const btn = document.getElementById('conn-submit-btn');
  if (btn) { btn.disabled=true; btn.textContent='Ansluter…'; btn.style.opacity='.7'; }

  const stepsDiv = document.getElementById('conn-flow-steps');
  if (stepsDiv) stepsDiv.style.display='block';

  let i = 0;
  const runStep = () => {
    if (i > 0) {
      const prev = document.getElementById(`step-ic-${id}-${i-1}`);
      if (prev) { prev.style.background='#e7f1ec'; prev.style.border='2px solid #1d6f4a'; prev.style.color='#1d6f4a'; prev.innerHTML='✓'; }
      const prevRow = document.getElementById(`step-${id}-${i-1}`);
      if (prevRow) prevRow.style.color='#3c4858';
    }
    if (i >= cfg.steps.length) {
      // Done
      setTimeout(() => {
        closeConnectionModal();
        // Now actually connect in the simulation
        if (window.connect) window.connect(id);
      }, 400);
      return;
    }
    const ic = document.getElementById(`step-ic-${id}-${i}`);
    if (ic) {
      ic.style.background='#e6edf5'; ic.style.border='2px solid #1b4e8a'; ic.style.color='#1b4e8a';
      ic.innerHTML=`<span style="display:inline-block;width:10px;height:10px;border:2px solid #1b4e8a;border-top-color:transparent;border-radius:50%;animation:rot .6s linear infinite"></span>`;
    }
    const row = document.getElementById(`step-${id}-${i}`);
    if (row) row.style.color='#001e50';
    i++;
    setTimeout(runStep, 600 + Math.random()*400);
  };
  runStep();
};

// Patch connect buttons — override onclick after DOM is ready
function patchConnectButtons() {
  document.querySelectorAll('.cbtn:not(.connected):not(.connecting)').forEach(btn => {
    const card = btn.closest('[class*="conn"]');
    if (!card) return;
    const onclick = btn.getAttribute('onclick')||'';
    const match = onclick.match(/connect\('([^']+)'\)/);
    if (match) {
      btn.setAttribute('onclick', `openConnectionModal('${match[1]}')`);
    }
  });
}

// Also patch the main connect() function fallback for providers without config
const _origConnect = window.connect;
window.connect = function(id) {
  const cfg = PROVIDER_CONFIGS[id];
  // If called directly (not from modal), show modal first
  if (cfg && (!window.S?.conns?.[id])) {
    openConnectionModal(id);
    return;
  }
  if (_origConnect) _origConnect(id);
};

// Patch buttons whenever view renders
const _origPaint = window.paint;
if (_origPaint) {
  window.paint = function() {
    _origPaint();
    setTimeout(patchConnectButtons, 50);
  };
}
setTimeout(patchConnectButtons, 800);

// Close on backdrop click
document.addEventListener('click', e => {
  if (e.target.id === 'conn-modal-bg') closeConnectionModal();
});
</script>
